# Grafana Dashboard Provisioning
# Phase 5 - Observability

apiVersion: 1

providers:
  - name: 'CAAS Platform Dashboards'
    orgId: 1
    folder: 'CAAS'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
